trigger:
- none

pr: none

schedules:
  - cron: "0 20 * * *"
    displayName: Nightly 10:00 PM Israel
    branches:
      include:
        - main
    always: true

parameters:
  - name: app_env
    default: qa1
    type: string

  - name: test_info
    default: nightly
    type: string

  - name: test_suite
    default: qa1
    displayName: Test Suite to Run
    type: string
    values:
      - qa1

  - name: enable_reporting
    default: 'true'
    type: string

  - name: recipient_email
    default: 'yakir.moshe@netafim.com'
    type: string

variables:
  - group: pipelines-access-config
  - group: nonprod-netbeatvx-services-vg
  - group: gs-automation-api

name: gs-automation-api-${{ parameters.app_env }}-${{ parameters.test_info }}

stages:

  # ────────────────────────────────────────────────────────────────
  # Run all API integration tests
  # ────────────────────────────────────────────────────────────────
  - stage: RunAPITests
    displayName: API Integration Tests
    jobs:

      - job: APITests
        displayName: Run API Tests (${{ parameters.test_suite }})
        timeoutInMinutes: 120
        pool:
          vmImage: ubuntu-latest

        steps:

          - checkout: self

          # ── 1. Python setup ───────────────────────────────────────
          - task: UsePythonVersion@0
            displayName: Use Python 3.11
            inputs:
              versionSpec: '3.13'
              addToPath: true

          # ── 2. Install dependencies ───────────────────────────────
          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: Install Python Dependencies

          # ── 3. Create output directories ──────────────────────────
          - script: |
              mkdir -p reports/allure-results/history
              mkdir -p reports/junit
              mkdir -p logs
            displayName: Create Report Directories

          # ── 4. Restore Allure history from previous build ─────────
          - task: PowerShell@2
            displayName: Find Previous Build with Allure History
            inputs:
              targetType: inline
              script: |
                $headers     = @{ Authorization = "Bearer $(System.AccessToken)"; 'Content-Type' = 'application/json' }
                $fullBranch  = "$(Build.SourceBranch)"
                $shortBranch = "$(Build.SourceBranchName)"
                $artifactName = "allure-history-api-$shortBranch"
                Write-Host "##vso[task.setvariable variable=shortBranchName]$shortBranch"
                try {
                  $uri    = "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_apis/build/builds?api-version=6.0&definitions=$(System.DefinitionId)&statusFilter=completed&resultFilter=succeeded,partiallySucceeded,failed&branchName=$fullBranch&`$top=50&queryOrder=queueTimeDescending"
                  $builds = Invoke-RestMethod -Uri $uri -Headers $headers
                  foreach ($build in $builds.value) {
                    if ($build.id -eq $(Build.BuildId)) { continue }
                    $artUri   = "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_apis/build/builds/$($build.id)/artifacts?api-version=6.0"
                    try {
                      $artifacts = Invoke-RestMethod -Uri $artUri -Headers $headers
                      foreach ($artifact in $artifacts.value) {
                        if ($artifact.name -eq $artifactName) {
                          Write-Host "Found history in build $($build.id)"
                          Write-Host "##vso[task.setvariable variable=foundHistoryBuildId]$($build.id)"
                          exit 0
                        }
                      }
                    } catch {}
                  }
                } catch {}
            continueOnError: true

          - task: DownloadBuildArtifacts@0
            displayName: Download Previous Allure History
            inputs:
              buildType: specific
              project: $(System.TeamProject)
              pipeline: $(System.DefinitionId)
              buildVersionToDownload: specific
              buildId: $(foundHistoryBuildId)
              artifactName: allure-history-api-$(Build.SourceBranchName)
              downloadPath: $(Build.SourcesDirectory)/history-download
            continueOnError: true
            condition: and(always(), ne(variables['foundHistoryBuildId'], ''))

          - script: |
              BRANCH="$(Build.SourceBranchName)"
              HIST="$(Build.SourcesDirectory)/history-download/allure-history-api-$BRANCH"
              if [ -d "$HIST" ] && [ -n "$(ls -A "$HIST" 2>/dev/null)" ]; then
                cp -r "$HIST"/* reports/allure-results/history/
                echo "Allure history restored."
              else
                echo '{"total": 0}' > reports/allure-results/history/history.json
                echo "No previous history - starting fresh."
              fi
            displayName: Restore Allure History

          # ── 5. Run pytest ─────────────────────────────────────────
          #   Exit 0 (pass/skip) => GREEN
          #   Exit 1 (failures)  => RED  (via PublishTestResults)
          - script: |
              echo "==================================================="
              echo " API Integration Tests"
              echo " Environment : ${{ parameters.app_env }}"
              echo " Suite       : ${{ parameters.test_suite }}"
              echo "==================================================="
              echo "--- ENV VAR LENGTHS (secrets not exposed) ---"
              echo "USER_EMAIL      : $USER_EMAIL"
              echo "PASSWORD length : ${#PASSWORD}"
              echo "IDS_URL         : $IDS_URL"
              echo "AUTH_TOKEN len  : ${#AUTH_TOKEN}"
              echo "USER_EMAIL_POOL : $USER_EMAIL_POOL"
              echo "---------------------------------------------"

              TEST_PATHS="tests/qa1/"

              python -m pytest $TEST_PATHS \
                --alluredir=reports/allure-results \
                --junitxml=reports/junit/junit.xml \
                --tb=short \
                -v \
                -ra \
                -s \
                -m "not flaky" \
                -W ignore::DeprecationWarning \
                -W ignore::urllib3.exceptions.InsecureRequestWarning \
                -p no:html
            displayName: Run API Tests
            env:
              USER_EMAIL: $(USER_EMAIL)
              PASSWORD: $(PASSWORD)
              IDS_URL: $(IDS_URL)
              OIDC_CLIENT_ID: 'growsphere-userportal'
              OIDC_REDIRECT_URI: 'https://localhost:4200/authentication/login-callback'
              SCOPES_VAL: 'openid%20profile%20NbPortal%20NbPortal.w%20farms%20offline_access'
              USER_EMAIL_POOL: $(USER_EMAIL_POOL)
              AUTH_TOKEN: $(AUTH_TOKEN)
              ENV_NAME: ${{ parameters.app_env }}
              CI: 'true'
            continueOnError: true

          # ── 6. Publish JUnit — drives RED / GREEN ─────────────────
          - task: PublishTestResults@2
            displayName: Publish Test Results
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: reports/junit/junit.xml
              testRunTitle: API Tests - ${{ parameters.app_env }} - ${{ parameters.test_info }}
              failTaskOnFailedTests: true
              failTaskOnMissingResultsFile: false
            condition: always()

          # ── 7. Generate Allure report ──────────────────────────────
          - script: |
              if ! command -v allure &> /dev/null; then
                curl -o allure.tgz -Ls https://github.com/allure-framework/allure2/releases/download/2.34.1/allure-2.34.1.tgz
                tar -zxf allure.tgz
                echo "##vso[task.prependpath]$PWD/allure-2.34.1/bin"
                export PATH="$PWD/allure-2.34.1/bin:$PATH"
              fi

              allure generate --clean --output allure-report-local reports/allure-results

              mkdir -p allure-history-new
              if [ -d "allure-report-local/history" ]; then
                cp -r allure-report-local/history/* allure-history-new/
              else
                echo '{"total": 0}' > allure-history-new/history.json
              fi
            displayName: Generate Allure Report
            condition: always()

          # ── 8. Publish artifacts ───────────────────────────────────
          - task: PublishBuildArtifacts@1
            displayName: Publish Allure Results
            inputs:
              pathToPublish: reports/allure-results
              artifactName: allure-results-api
            condition: always()

          - task: PublishBuildArtifacts@1
            displayName: Publish Allure History
            inputs:
              pathToPublish: allure-history-new
              artifactName: allure-history-api-$(Build.SourceBranchName)
            condition: always()

          - task: PublishAllureReport@1
            displayName: Publish Allure Report Tab
            inputs:
              testResultsDir: reports/allure-results
              reportName: API Test Report - ${{ parameters.app_env }} - ${{ parameters.test_info }}
            condition: always()
            continueOnError: true

          # ── 9. Send email via Python script ───────────────────────
          #   HTML generation lives in scripts/send_report_email.py
          #   keeping this YAML clean and free of linter warnings.
          - script: |
              REPORT_URL="$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)&view=qameta.allure-azure-pipelines.build-allure-tab"

              python3 scripts/send_report_email.py \
                --summary-json  allure-report-local/widgets/summary.json \
                --env-name      "${{ parameters.app_env }}" \
                --test-info     "${{ parameters.test_info }}" \
                --build-id      "$(Build.BuildId)" \
                --build-number  "$(Build.BuildNumber)" \
                --report-url    "$REPORT_URL" \
                --recipients    "${{ parameters.recipient_email }}"
            displayName: Send Email Notification
            env:
              SMTP_SERVER: $(sendGridSmtpServer)
              SMTP_PORT: $(sendGridSmtpPort)
              SMTP_USER: $(sendGridSmtpPortUser)
              SMTP_PASSWORD: $(sendGridSmtppassword)
              NOREPLY_EMAIL: $(noreply)
            condition: always()
